services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - ENV=dev
    volumes:
      - ../data:/app/data
      - ../config.yaml:/app/config.yaml
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
